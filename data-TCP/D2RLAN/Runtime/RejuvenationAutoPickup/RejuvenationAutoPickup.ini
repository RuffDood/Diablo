[AutoPickup]
; 1 = actif, 0 = inactif.
Enabled=1

; Rejuvenation Potion (rvs) et Full Rejuvenation Potion (rvl).
PickNormalRejuvenation=1
PickFullRejuvenation=1

; 1 = si les colonnes choisies sont pleines, tenter l'inventaire.
; Si l'inventaire est plein, le moteur laisse naturellement la potion au sol.
OverflowToInventory=1

; Diagnostic temporaire dans RejuvenationAutoPickup_Logs.txt.
Diagnostics=0

; Distance de ramassage serveur. D2R 1.2.69270 accepte au maximum 4.
PickupDistance=4

; Colonnes de ceinture réservées à l'autopickup des rejuvs.
; Exemples : 1,2,3,4 (toutes), 1,2 (première moitié), 3,4 (seconde moitié), 3 (une colonne).
Columns=1,2,3,4

; Limitation en frames de jeu; 3 reste réactif sans scanner chaque paquet d'entrée.
MinimumIntervalFrames=3
